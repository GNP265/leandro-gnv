{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Leandro GNV</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="icon">🔥</div>
      <h1>Leandro GNV</h1>
      <p>Sistema de Gestão</p>
    </div>
    {% if messages %}{% for msg in messages %}<div class="alert alert-error">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field" style="margin-bottom:12px">
        <label>Usuário</label>
        <input type="text" name="username" required autofocus placeholder="Digite seu usuário">
      </div>
      <div class="field" style="margin-bottom:20px">
        <label>Senha</label>
        <input type="password" name="password" required placeholder="Digite sua senha">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
